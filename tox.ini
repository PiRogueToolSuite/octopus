[tox]
requires =
    tox>=4.2
    uv>=0.4.10
    tox-uv>=1.11.3
env_list =
    3.11
    3.12
    3.13
isolated_build = True

[testenv]
description = run the unit tests with pytest under {base_python}
usedevelop = true
dependency_groups =
    test
allowlist_externals =
    bash
commands =
    coverage run -m pytest --doctest-modules --md-report --md-report-verbose=0 --md-report-output test-report.md
    bash -c "coverage report --format=markdown | tee test-coverage.md"
    bash -c "coverage xml"

[testenv:fix]
description = format the code base to adhere to our styles, and complain about what we cannot do automatically
skip_install = true
dependency_groups =
    dev
    test
commands =
    ruff format
    pre-commit run --all-files

[testenv:type]
description = run type check on code base
dependency_groups =
    test
commands =
    mypy octopus

[testenv:docs]
description = generate documentation
dependency_groups =
    docs
commands =
    sphinx-build -M html ./docs docs/_build/
    sphinx-build -M linkcheck ./docs docs/_build/

[testenv:apidoc]
description = generate API documentation
dependency_groups =
    docs
commands =
    sphinx-apidoc -f --remove-old -e -o ./docs/source/ ./octopus/

[testenv:servedocs]
description = serve documentation
dependency_groups =
    docs
commands =
    sphinx-autobuild --watch octopus  docs/ docs/_build/html
